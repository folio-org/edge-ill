get:
  tags: [ PatronRequests ]
  description: "Search with the supplied criteria"
  operationId: getRequests
  parameters:
    - $ref: '../../parameters/query/term.yaml'
    - $ref: '../../parameters/query/match.yaml'
    - $ref: '../../parameters/query/filters.yaml'
    - $ref: '../../parameters/query/sort.yaml'
    - $ref: '../../parameters/query/max.yaml'
    - $ref: '../../parameters/query/per-page.yaml'
    - $ref: '../../parameters/query/offset.yaml'
    - $ref: '../../parameters/query/page.yaml'
    - $ref: '../../parameters/query/stats.yaml'
    - $ref: '../../parameters/query/include-terminal.yaml'
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../../schemas/dto/PatronRequests.yaml'
    '400':
      $ref: '../../error-responses/BadRequest.yaml'
    '500':
      $ref: '../../error-responses/InternalServerError.yaml'

post:
  tags: [ PatronRequests ]
  description: "Creates a new patron request record"
  operationId: create
  requestBody:
    description: Patron Request Object
    required: true
    content:
      application/json:
        schema:
          $ref: '../../schemas/dto/PatronRequest.yaml'
  responses:
    '201':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../../schemas/dto/PatronRequest.yaml'
    '400':
      $ref: '../../error-responses/BadRequest.yaml'
    '500':
      $ref: '../../error-responses/InternalServerError.yaml'
