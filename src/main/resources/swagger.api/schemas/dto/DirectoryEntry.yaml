    type: string
  foafUrl:
    type: string
  entryUrl:
    type: string
  phoneNumber:
    type: string
  emailAddress:
    type: string
  contactName:
    type: string
  brandingUrl:
    type: string
  pubLastUpdate:
    type: integer
    format: int64
